version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      frontend-runtime:
        patterns:
          - react
          - react-dom
          - vite
          - "@vitejs/*"
          - "@tailwindcss/*"
          - tailwindcss
      tests-and-types:
        patterns:
          - "@testing-library/*"
          - "@types/*"
          - typescript
          - vitest

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
